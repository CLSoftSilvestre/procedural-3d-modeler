name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; newer pushes cancel in-flight runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Gate the deploy on the same checks we run locally.
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          # Project sites are served from /<repo>/ — derive it from the repo name.
          DEPLOY_BASE: /${{ github.event.repository.name }}/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
